name: Amazon Textract
description: Amazon Textract is a machine learning service that automatically extracts text, handwriting, and structured data
  from scanned documents. It goes beyond simple optical character recognition (OCR) to identify and extract data from forms
  and tables, enabling automated document processing workflows without manual review or custom code.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
url: https://aws.amazon.com/textract/
created: '2024-01-15'
modified: '2026-05-19'
apis:
- name: Amazon Textract API
  description: The Amazon Textract API provides programmatic access to extract text, handwriting, and structured data from
    documents. It enables developers to analyze documents for text detection, form extraction, table extraction, and expense
    analysis, supporting both synchronous and asynchronous processing for documents of varying sizes.
