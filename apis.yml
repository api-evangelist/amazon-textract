modified: '2026-03-13'
apis:
- name: Amazon Textract API
  description: >-
    The Amazon Textract API provides programmatic access to extract text,
    handwriting, and structured data from documents. It enables developers to
    analyze documents for text detection, form extraction, table extraction,
    and expense analysis, supporting both synchronous and asynchronous
    processing for documents of varying sizes.
