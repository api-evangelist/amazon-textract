naftiko: 1.0.0-alpha2
info:
  label: Amazon Textract — ID Analysis
  description: 'Amazon Textract — ID Analysis. 1 operations. Lead operation: Amazon Textract Analyze ID. Self-contained Naftiko
    capability covering one Amazon Textract business surface.'
  tags:
  - Amazon Textract
  - ID Analysis
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_TEXTRACT_API_KEY: AMAZON_TEXTRACT_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-textract-id-analysis
    baseUri: https://textract.amazonaws.com
    description: Amazon Textract — ID Analysis business capability. Self-contained, no shared references.
    resources:
    - name: '#AnalyzeID'
      path: /#AnalyzeID
      operations:
      - name: analyzeid
        method: POST
        description: Amazon Textract Analyze ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: amazon-textract-id-analysis-rest
    port: 8080
    description: REST adapter for Amazon Textract — ID Analysis. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/analyzeid
      name: analyzeid
      description: 'REST surface for #AnalyzeID.'
      operations:
      - method: POST
        name: analyzeid
        description: Amazon Textract Analyze ID
        call: amazon-textract-id-analysis.analyzeid
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-textract-id-analysis-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Textract — ID Analysis. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-textract-analyze-id
      description: Amazon Textract Analyze ID
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-textract-id-analysis.analyzeid
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
